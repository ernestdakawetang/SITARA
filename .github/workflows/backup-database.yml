name: Backup Supabase Database

# Tujuan: dump seluruh isi database Supabase tiap hari, lalu simpan
# ke repo GitHub TERPISAH yang PRIVATE (bukan repo aplikasi ini,
# supaya data pelanggan tidak ikut ter-publish ke publik).
#
# Supabase FREE TIER tidak menyediakan auto-backup sama sekali
# (fitur itu baru ada mulai paket Pro $25/bulan) — workflow ini
# adalah pengganti gratisnya.

on:
  schedule:
    - cron: "0 18 * * *"   # setiap hari jam 18:00 UTC = 01:00 WIB
  workflow_dispatch:        # bisa dipicu manual juga dari tab Actions

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get update -y && sudo apt-get install -y postgresql-client

      - name: Dump database Supabase
        run: |
          pg_dump "${{ secrets.SUPABASE_DB_URL }}" --no-owner --no-privileges -f backup.sql

      - name: Push hasil backup ke repo private
        env:
          TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
          REPO: ${{ secrets.BACKUP_REPO }}
        run: |
          DATE=$(date +'%Y-%m-%d')
          git clone https://x-access-token:${TOKEN}@github.com/${REPO}.git backup-repo
          mkdir -p backup-repo/backups
          cp backup.sql "backup-repo/backups/backup-${DATE}.sql"

          # Bersihkan backup lama: cuma simpan 30 file terbaru
          # (nama file berformat backup-YYYY-MM-DD.sql, jadi urutan
          # alfabetis = urutan tanggal, aman dipakai untuk sorting)
          cd backup-repo/backups
          ls -1 backup-*.sql | sort | head -n -30 | xargs -r rm --
          cd ../..

          cd backup-repo
          git config user.name "Backup Bot"
          git config user.email "backup-bot@users.noreply.github.com"
          git add .
          git commit -m "Backup database ${DATE} (auto-cleanup: simpan 30 hari terakhir)" || echo "Tidak ada perubahan data, skip commit"
          git push
